# =============================================================================
# Helm Repositories - Chart Sources
# =============================================================================

---
# GitHub Actions Runner Controller - using HelmRepository with OCI type
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/actions/actions-runner-controller-charts

---
# GitHub ARC Runner Scale Set (same registry)
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: arc-runner-scale-set
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/actions/actions-runner-controller-charts

---
# External Secrets Operator
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.external-secrets.io

---
# Jetstack (cert-manager)
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jetstack.io

# =============================================================================
# Apps Kustomization - Dev Cluster
# =============================================================================
# This Kustomization deploys application workloads:
# - ARC Controller
# - Runner Scale Sets
# =============================================================================

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-runners
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/runners/overlays/dev
  prune: true

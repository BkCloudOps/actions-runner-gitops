# =============================================================================
# ARC Controller (gha-runner-scale-set-controller) — shared across flavors.
# =============================================================================
# The controller is required only by the gh-supported flavor; the community
# flavor brings its own controller. The cluster Kustomization includes this
# file only when at least one gh-supported scale set is enabled.
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
  labels:
    toolkit.fluxcd.io/tenant: runners

---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
  labels:
    toolkit.fluxcd.io/tenant: runners

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: arc-controller
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-systems
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: cert-manager
      namespace: flux-system

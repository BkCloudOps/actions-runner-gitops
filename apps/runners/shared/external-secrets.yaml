# =============================================================================
# Shared secrets for runners (per env)
# =============================================================================
# - github-pat-secret  -> consumed by every gha-runner-scale-set HelmRelease
# - ghcr-pull-secret   -> consumed by every runner Pod's imagePullSecrets
# Both are synced from Azure Key Vault by External Secrets Operator (installed
# by infrastructure/controllers/external-secrets).
# =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-pat-secret
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: github-pat-secret
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: github-pat

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ .ghcrAuth | b64enc }}"}}}
  data:
    # Value in Key Vault: "<github-user>:<github-token-with-read:packages>"
    - secretKey: ghcrAuth
      remoteRef:
        key: ghcr-auth

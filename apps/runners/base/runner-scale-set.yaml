# =============================================================================
# Runner Scale Set - straw-hat-runners-linux
# =============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: straw-hat-runners-linux
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: arc-runner-scale-set
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-runners
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: arc-controller
      namespace: flux-system
    - name: external-secrets
      namespace: flux-system
  # NOTE: Do NOT inject the PAT via valuesFrom here. The ExternalSecret below
  # syncs `github-pat-secret` (with key `github_token`) from Azure Key Vault
  # in the `arc-runners` namespace; the chart consumes it by name.
  # See docs/13-crd-reference.md (githubConfigSecret) and docs/07-authentication.md.
  values:
    githubConfigUrl: "https://github.com/BkCloudOps"
    githubConfigSecret: github-pat-secret
    # `runnerScaleSetName` is what appears in the GitHub UI and is patched
    # per-environment by overlays. `runnerGroup` is the (pre-existing) GitHub
    # runner group; leave at "default" unless a custom group exists on GitHub.
    runnerScaleSetName: "straw-hat-runners-linux"
    runnerGroup: "default"
    minRunners: 1
    maxRunners: 10
    containerMode:
      type: "dind"
    # GitHub runner labels for workflow targeting (runs-on)
    labels:
      - self-hosted
      - linux
      - x64
      - scale-set

---
# External Secret for GitHub PAT in flux-system namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-pat-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: github-pat-secret
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: github-pat

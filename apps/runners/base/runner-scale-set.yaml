# =============================================================================
# Runner Scale Set - straw-hat-runners-linux
# =============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: straw-hat-runners-linux
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: arc-runner-scale-set
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-runners
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: arc-controller
      namespace: flux-system
    - name: external-secrets
      namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: github-pat-secret
      valuesKey: github_token
      targetPath: githubConfigSecret.github_token
  values:
    githubConfigUrl: "https://github.com/BkCloudOps"
    runnerScaleSetName: "straw-hat-runners-linux"
    runnerGroup: "straw-hat-runners-linux-dev"
    minRunners: 1
    maxRunners: 10
    containerMode:
      type: "dind"
    # GitHub runner labels for workflow targeting (runs-on)
    labels:
      - self-hosted
      - linux
      - x64
      - scale-set

---
# External Secret for GitHub PAT in flux-system namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-pat-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: github-pat-secret
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: github-pat

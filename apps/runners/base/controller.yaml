---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
  labels:
    toolkit.fluxcd.io/tenant: runners

---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
  labels:
    toolkit.fluxcd.io/tenant: runners

---
# ARC Controller
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: arc-controller
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-systems
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: cert-manager
      namespace: flux-system

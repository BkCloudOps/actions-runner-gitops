# =============================================================================
# Per-runner-type overlay (dev / kubernetes / gh-supported flavor)
# =============================================================================
# Final name: straw-hat-runners-linux-dev-kubernetes
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/gh-supported
nameSuffix: -dev-kubernetes
patches:
  - patch: |
      - op: replace
        path: /spec/values/runnerScaleSetName
        value: "straw-hat-runners-linux-dev-kubernetes"
      - op: replace
        path: /spec/values/runnerGroup
        value: "straw-hat-runners-linux-dev-kubernetes"
      - op: replace
        path: /spec/values/minRunners
        value: 1
      - op: replace
        path: /spec/values/maxRunners
        value: 20
      - op: replace
        path: /spec/values/containerMode/type
        value: "kubernetes"
      - op: replace
        path: /spec/values/template/spec/containers/0/image
        value: "ghcr.io/actions/actions-runner:latest"
    target:
      kind: HelmRelease
      name: runner-scale-set

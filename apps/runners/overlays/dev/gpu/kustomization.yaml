# =============================================================================
# Per-runner-type overlay (dev / gpu / gh-supported flavor)
# =============================================================================
# Final name: straw-hat-runners-linux-dev-gpu
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/gh-supported
nameSuffix: -dev-gpu
patches:
  - patch: |
      - op: replace
        path: /spec/values/runnerScaleSetName
        value: "straw-hat-runners-linux-dev-gpu"
      - op: replace
        path: /spec/values/runnerGroup
        value: "straw-hat-runners-linux-dev-gpu"
      - op: replace
        path: /spec/values/minRunners
        value: 0
      - op: replace
        path: /spec/values/maxRunners
        value: 4
      - op: replace
        path: /spec/values/containerMode/type
        value: "dind"
      - op: replace
        path: /spec/values/template/spec/containers/0/image
        value: "ghcr.io/actions/actions-runner:latest"
      - op: add
        path: /spec/values/template/spec/nodeSelector
        value:
          accelerator: "nvidia"
      - op: add
        path: /spec/values/template/spec/tolerations
        value:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
    target:
      kind: HelmRelease
      name: runner-scale-set

# =============================================================================
# Per-runner-type overlay (prod / kubernetes / gh-supported flavor)
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/gh-supported
nameSuffix: -prod-kubernetes
patches:
  - patch: |
      - op: replace
        path: /spec/values/runnerScaleSetName
        value: "straw-hat-runners-linux-prod-kubernetes"
      - op: replace
        path: /spec/values/runnerGroup
        value: "straw-hat-runners-linux-prod-kubernetes"
      - op: replace
        path: /spec/values/minRunners
        value: 2
      - op: replace
        path: /spec/values/maxRunners
        value: 30
      - op: replace
        path: /spec/values/containerMode/type
        value: "kubernetes"
      - op: replace
        path: /spec/values/template/spec/containers/0/image
        value: "ghcr.io/actions/actions-runner:latest"
    target:
      kind: HelmRelease
      name: runner-scale-set
